<!-- ============================================================ -->
<!--  HERO — Imagem Destaque + Título + Texto                   -->
<!-- ============================================================ -->
<tr>
    <td style="padding: 0px 16px 16px 16px; background-color:#ffffff;">

        <!-- Imagem Hero -->
        <img class="hero-img" src="{{IMAGEM_HERO}}" alt="{{TITULO_HERO}}" width="504" style="
            width: 100%;
            max-width: 504px;
            height: auto;
            border-radius: 8px;
            display: block;
            margin-bottom: 24px;
        " />

        <!-- Título Hero -->
        <h2 style="
            font-family: 'Hotmart Sans', sans-serif;
            font-size: 24px;
            font-weight: 400;
            line-height: 1.5;
            color: #0d0d0d;
            margin: 0 0 12px 0;
            padding: 0;
        ">
            {{TITULO_HERO}}
        </h2>

        <!-- Texto Hero -->
        <p style="
            font-family: 'Hotmart Sans', sans-serif;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.6;
            color: #0d0d0d;
            margin: 0;
            padding: 0;
        ">
            {{TEXTO_HERO}}
        </p>

    </td>
</tr>
