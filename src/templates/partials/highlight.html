<!-- ============================================================ -->
<!--  HIGHLIGHT — Banner da seção + Item de destaque            -->
<!--  Placeholders: {{TITULO_HIGHLIGHT}}, {{TEXTO_HIGHLIGHT}}   -->
<!--  Variável: {{BG_COLOR}} — alterna entre #ffffff e #f5f3ef  -->
<!-- ============================================================ -->

<!-- Banner "Highlights" — incluído apenas no primeiro highlight -->
{{HIGHLIGHT_BANNER}}

<!-- Item do highlight -->
<tr>
    <td class="highlight-item" style="
        padding: 8px 16px;
        background-color: {{BG_COLOR}};
        border-bottom: 1px solid #c3bfb8;
    ">
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
            <tr>
                <td style="padding-left: 0; padding-right: 0;">

                    <!-- Label decorativo -->
                    <p style="
                        font-family: 'Hotmart Sans', sans-serif;
                        font-size: 12px;
                        font-weight: 700;
                        line-height: 1.5;
                        color: #ff4000;
                        text-transform: uppercase;
                        letter-spacing: 1.5px;
                        margin: 0 0 8px 0;
                        padding: 0;
                    ">
                        #highlight
                    </p>

                    <!-- Título do Highlight -->
                    <h3 style="
                        font-family: 'Nunito Sans', sans-serif;
                        font-size: 18px;
                        font-weight: 700;
                        line-height: 1.5;
                        color: #0d0d0d;
                        margin: 0 0 10px 0;
                        padding: 0;
                    ">
                        {{TITULO_HIGHLIGHT}}
                    </h3>

                    <!-- Texto do Highlight -->
                    <p style="
                        font-family: 'Hotmart Sans', sans-serif;
                        font-size: 14px;
                        font-weight: 400;
                        line-height: 1.6;
                        color: #7a7773;
                        margin: 0;
                        padding: 0;
                    ">
                        {{TEXTO_HIGHLIGHT}}
                    </p>

                </td>
            </tr>
        </table>
    </td>
</tr>
